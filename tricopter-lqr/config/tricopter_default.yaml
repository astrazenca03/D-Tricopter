# Asymmetric Servoless Tricopter Configuration
# All units in SI: meters, kg, seconds, radians

vehicle:
  mass: 1.5  # kg

  # Full 3x3 inertia tensor [kg·m²]
  # Symmetric: J = [[Jxx, Jxy, Jxz], [Jxy, Jyy, Jyz], [Jxz, Jyz, Jzz]]
  inertia_tensor:
    Jxx: 0.03
    Jxy: 0.001
    Jxz: 0.0005
    Jyy: 0.025
    Jyz: 0.0008
    Jzz: 0.04

rotors:
  # Each rotor: position from CG [m], thrust axis (unit vector),
  # spin axis (unit vector), spin direction (+1=CW, -1=CCW),
  # thrust coeff k_T [N/(rad/s)²], drag coeff k_Q [N·m/(rad/s)²]
  - name: "front"
    position: [0.25, 0.0, 0.0]
    thrust_axis: [0.0, 0.0, 1.0]
    spin_axis: [0.0, 0.0, 1.0]
    spin_direction: 1
    k_T: 1.5e-5
    k_Q: 2.5e-7

  - name: "rear_left"
    position: [-0.15, 0.20, 0.0]
    thrust_axis: [0.0, 0.0, 1.0]
    spin_axis: [0.0, 0.0, 1.0]
    spin_direction: -1
    k_T: 1.5e-5
    k_Q: 2.5e-7

  - name: "rear_right"
    position: [-0.15, -0.20, 0.0]
    thrust_axis: [0.0, 0.0, 1.0]
    spin_axis: [0.0, 0.0, 1.0]
    spin_direction: 1
    k_T: 1.5e-5
    k_Q: 2.5e-7

controller:
  # LQR Q matrix diagonal weights (12 states: pos[3], vel[3], att_error[3], ang_vel[3])
  Q_weights:
    position: [10.0, 10.0, 20.0]
    velocity: [5.0, 5.0, 10.0]
    attitude: [100.0, 100.0, 50.0]
    angular_velocity: [10.0, 10.0, 5.0]

  # LQR R matrix diagonal weights (one per rotor input: delta_omega_sq)
  R_weights: [1.0, 1.0, 1.0]

  # Motor speed limits [rad/s]
  omega_min: 0.0
  omega_max: 2500.0

simulation:
  dt: 0.001           # Integration timestep [s]
  duration: 10.0       # Total sim time [s]

  # Initial perturbation from hover (Euler angles converted to quaternion)
  initial_roll_deg: 10.0
  initial_pitch_deg: 5.0
  initial_yaw_deg: 0.0
  initial_position: [0.0, 0.0, 0.0]
  initial_velocity: [0.0, 0.0, 0.0]
  initial_angular_velocity: [0.0, 0.0, 0.0]

  # Step disturbance: impulse torque [N·m] applied at specified time [s]
  disturbance:
    enabled: true
    time: 3.0
    torque: [0.05, 0.03, 0.02]  # [N·m] in body frame

  output_file: "simulation_log.csv"
